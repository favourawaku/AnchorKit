<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ApiRequestPanel JSON Validation Test</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: #f5f5f5;
      padding: 40px 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    h1 {
      color: #1a1a1a;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 30px;
    }

    .test-section {
      background: white;
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .test-section h2 {
      font-size: 18px;
      margin-bottom: 16px;
      color: #333;
    }

    .editable-body {
      width: 100%;
      min-height: 150px;
      padding: 16px;
      background: #f8f9fa;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-family: 'Monaco', 'Menlo', 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.6;
      color: #1a1a1a;
      resize: vertical;
      transition: border-color 0.2s ease;
    }

    .editable-body:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .editable-body.error {
      border-color: #ef4444;
    }

    .editable-body.error:focus {
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
    }

    .json-error {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 6px;
      color: #dc2626;
      font-size: 13px;
      margin-top: 12px;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .success-message {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 6px;
      color: #16a34a;
      font-size: 13px;
      margin-top: 12px;
    }

    .submit-button {
      padding: 12px 24px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 12px;
    }

    .submit-button:hover:not(:disabled) {
      background: #2563eb;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
    }

    .submit-button:active:not(:disabled) {
      transform: translateY(0);
    }

    .submit-button:disabled {
      background: #e5e7eb;
      color: #9ca3af;
      cursor: not-allowed;
      opacity: 0.6;
    }

    .status {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      margin-top: 12px;
    }

    .status.valid {
      background: #dcfce7;
      color: #16a34a;
    }

    .status.invalid {
      background: #fee2e2;
      color: #dc2626;
    }

    .test-cases {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }

    .test-case {
      padding: 12px;
      background: #f8f9fa;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .test-case:hover {
      background: #e9ecef;
    }

    .test-case-title {
      font-weight: 600;
      margin-bottom: 4px;
      color: #333;
    }

    .test-case-code {
      font-family: 'Monaco', 'Menlo', 'Courier New', monospace;
      font-size: 12px;
      color: #666;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 600;
      margin-left: 8px;
    }

    .badge.valid {
      background: #dcfce7;
      color: #16a34a;
    }

    .badge.invalid {
      background: #fee2e2;
      color: #dc2626;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧪 ApiRequestPanel JSON Validation Test</h1>
    <p class="subtitle">Interactive test for client-side JSON validation</p>

    <div class="test-section">
      <h2>Live JSON Validator</h2>
      <textarea 
        id="jsonInput" 
        class="editable-body" 
        placeholder='{"key": "value"}'
        aria-label="Request body JSON"
      >{"name": "John Doe", "email": "john@example.com"}</textarea>
      
      <div id="errorContainer"></div>
      <div id="successContainer"></div>
      
      <button id="submitBtn" class="submit-button">Submit Request</button>
      <div id="statusContainer"></div>
    </div>

    <div class="test-section">
      <h2>Quick Test Cases</h2>
      <p style="color: #666; font-size: 14px; margin-bottom: 12px;">Click any test case to load it into the editor above</p>
      <div class="test-cases" id="testCases"></div>
    </div>
  </div>

  <script>
    const testCases = [
      {
        title: 'Valid JSON Object',
        code: '{"key": "value", "number": 42}',
        valid: true
      },
      {
        title: 'Valid Nested JSON',
        code: '{"user": {"name": "Alice", "age": 30}, "active": true}',
        valid: true
      },
      {
        title: 'Valid JSON Array',
        code: '[1, 2, 3, "test", true, null]',
        valid: true
      },
      {
        title: 'Empty Object',
        code: '{}',
        valid: true
      },
      {
        title: 'Invalid - Missing Closing Brace',
        code: '{"key": "value"',
        valid: false
      },
      {
        title: 'Invalid - Trailing Comma',
        code: '{"key": "value",}',
        valid: false
      },
      {
        title: 'Invalid - Unquoted Key',
        code: '{key: "value"}',
        valid: false
      },
      {
        title: 'Invalid - Single Quotes',
        code: "{'key': 'value'}",
        valid: false
      },
      {
        title: 'Invalid - Missing Value',
        code: '{"key": }',
        valid: false
      },
      {
        title: 'Invalid - Incomplete Array',
        code: '[1, 2, 3',
        valid: false
      }
    ];

    const jsonInput = document.getElementById('jsonInput');
    const submitBtn = document.getElementById('submitBtn');
    const errorContainer = document.getElementById('errorContainer');
    const successContainer = document.getElementById('successContainer');
    const statusContainer = document.getElementById('statusContainer');
    const testCasesContainer = document.getElementById('testCases');

    let currentError = null;

    function validateJson(value) {
      if (!value.trim()) {
        return { valid: true, error: null };
      }

      try {
        JSON.parse(value);
        return { valid: true, error: null };
      } catch (err) {
        return { valid: false, error: err.message };
      }
    }

    function updateUI() {
      const value = jsonInput.value;
      const result = validateJson(value);

      // Clear previous messages
      errorContainer.innerHTML = '';
      successContainer.innerHTML = '';
      statusContainer.innerHTML = '';

      if (result.valid) {
        jsonInput.classList.remove('error');
        submitBtn.disabled = false;
        currentError = null;
        
        if (value.trim()) {
          successContainer.innerHTML = `
            <div class="success-message">
              <span>✓</span>
              <span>Valid JSON</span>
            </div>
          `;
        }
        
        statusContainer.innerHTML = '<span class="status valid">✓ Valid - Submit Enabled</span>';
      } else {
        jsonInput.classList.add('error');
        submitBtn.disabled = true;
        currentError = result.error;
        
        errorContainer.innerHTML = `
          <div class="json-error" role="alert">
            <span>⚠️</span>
            <span>Invalid JSON: ${result.error}</span>
          </div>
        `;
        
        statusContainer.innerHTML = '<span class="status invalid">✗ Invalid - Submit Disabled</span>';
      }
    }

    jsonInput.addEventListener('input', updateUI);

    submitBtn.addEventListener('click', () => {
      if (!currentError) {
        const value = jsonInput.value.trim();
        const parsed = value ? JSON.parse(value) : {};
        alert('✅ Form submitted successfully!\n\nParsed JSON:\n' + JSON.stringify(parsed, null, 2));
      }
    });

    // Render test cases
    testCases.forEach(testCase => {
      const div = document.createElement('div');
      div.className = 'test-case';
      div.innerHTML = `
        <div class="test-case-title">
          ${testCase.title}
          <span class="badge ${testCase.valid ? 'valid' : 'invalid'}">
            ${testCase.valid ? 'Valid' : 'Invalid'}
          </span>
        </div>
        <div class="test-case-code">${testCase.code}</div>
      `;
      div.addEventListener('click', () => {
        jsonInput.value = testCase.code;
        updateUI();
        jsonInput.focus();
      });
      testCasesContainer.appendChild(div);
    });

    // Initial validation
    updateUI();
  </script>
</body>
</html>
